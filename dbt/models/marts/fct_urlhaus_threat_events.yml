version: 2

models:
  - name: fct_urlhaus_threat_events
    columns:
      - name: event_id
        tests:
          - not_null
          - unique
      - name: event_time
        tests:
          - not_null
      - name: ingested_at
        tests:
          - not_null
      - name: source
        tests:
          - not_null
          - accepted_values:
              values: ["urlhaus"]
      - name: url
        tests:
          - not_null
